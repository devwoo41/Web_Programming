<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color:red;
        }
        p {
            font-size: 40px;
        }
    </style>
<!-- style 태그를 head 태그에 넣지 않는 경우도 있는데, 일반적으로 브라우저는 렌더링을 할때에
 위에서 아래로 읽어서 해석하는데, 만약 style 태그가 body 태그 안에 있다면, 해당 스타일은 body 태그가 렌더링된 후에 적용되고,
 이를 FOUC 현상이라고 한다. 스타일이 뒤늦게 렌더링 되는 것을 의미한다.-->
</head>
<body>
    <h1>My Heading</h1>
    <p>Hello World!</p>
</body>
</html>
