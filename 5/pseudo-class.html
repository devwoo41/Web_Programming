<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의사 클래스</title>
    <style>
        h2:first-letter { color: red;}
        strong:after { content: url("../media/star.png"); }
        li:nth-child(2n+1) {font-style: italic;}
        li:hover {background: cyan;}
        li:active {color:red;}
    </style>
</head>
<body>
    <h2>Web Programming</h2>
    <div>2학기 <strong>학습 내용</strong>입니다.</div>
    <ul>
        <li>HTML5</li>
        <li><strong>CSS3</strong></li>
        <li>JavaScript</li>
        <li>Node.js</li>
        <li>Express</li>
    </ul>
</body>
</html>
