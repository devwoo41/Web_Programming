<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@import로 스타일 시트 파일 불러오기</title>
    <style>
        @import url(mystyle.css);
    </style>
</head>
<body>
    <h2>@import로 스타일 시트 파일 불러오기</h2>
    <p>나는 <span>HTML</span>을 좋아합니다.</p>
    <p>나는 <span>CSS</span>도 좋아합니다.</p>
</body>
</html>
