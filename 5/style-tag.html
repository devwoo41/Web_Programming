<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&lt;style&gt;태그로 스타일 시트 적용</title>
    <style>
        h2 { background-color: cyan; text-align: center;}
        p {font-style: italic;}
        span { color: #ff0000; font-size: 24px; }
    </style>
</head>
<body>
    <h2>&lt;style&gt; 태그로 스타일 시트 적용</h2>
    <p>나는 <span>HTML</span>을 좋아합니다.</p>
    <p>나는 <span>CSS</span>도 좋아합니다.</p>
</body>
</html>
