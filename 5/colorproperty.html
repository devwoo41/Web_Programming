<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=4, initial-scale=1.0">
    <title>색 관련 프로퍼티</title>
    <style>
        p { color: white;}
    </style>
</head>
<body>
    <h2>색 관련 프로퍼티</h2>
    <p style="background-color:blue">blue</p>
    <p style="background-color:lightblue">lightblue</p>
    <p style="background-color:mediumblue">mediumblue</p>
    <p style="background-color:darkblue">darkblue</p>
    <p style="background-color:maroon">maroon</p>
    <p style="background-color: #ffa500;">#ffa500(orange)</p>
    <p style="background-color: #808000">#808000(olive)</p>
</body>
</html>
