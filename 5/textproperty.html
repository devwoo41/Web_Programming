<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 프로퍼티</title>
    <style>
        h3 { text-align: center; }
        span { text-decoration: underline; }
        strong { text-decoration: line-through; }
        .p1 { text-align: justify; }
        .p2 { text-align: right; text-indent: 1em; }
    </style>
</head>
<body>
    <h3>텍스트 프로퍼티</h3>
    <p class="p1">HTML의 태그만으로 기존의 워드 프로세서와 같이 들여쓰기, 정렬, 공백, 간격 등과 
        세밀한 <span>텍스트 제어</span>를 할 수 없다.
    </p>
    <p class="p2">그러나, <strong>스타일 시트</strong>는 이를 가능하게 한다. 들여쓰기, 정렬에 대해서 알아본다.</p>
    <p><a href="https://www.naver.com" style="text-decoration: none">밑줄이 없는 네이버 링크</a></p>
</body>
</html>
