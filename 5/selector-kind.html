<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선택자의 종류</title>
    <style>
        * { color: blue; }
        #health { font-size: 24px; }
        .fruit { font-weight: bold; }
        .veggie { font-style: italic; }
        .green { color: green; }
        .red { color: red; }
    </style>
</head>
<body>
    <h2>과일과 채소</h2>
    <p>과일과 채소를 많이 먹어서 <span id="health">건강</span>을 유지합시다.</p>
    <p><span class="fruit">과일은 bold</span>,
    <span class="veggie">채소는 italic</span>으로 표시합시다.</p>
    <ul>
        <li class="fruit green">매실</li>
        <li class="fruit red">사과</li>
        <li class="fruit green">청포도</li>
        <li class="veggie red">당근</li>
        <li class="veggie green">배추</li>
        <li class="veggie green">상추</li>
    </ul>
</body>
</html>
