    <h3 id="prologue">서시, 윤동주</h3>
    죽는 날까지 하늘을 우러러<br>
한 점 부끄럼이 없기를,<br>
잎새에 이는 바람에도<br>
나는 괴로워했다.<br>
. . .

    . . . 
    <h3 id="starrynight">별 헤는 밤, 윤동주</h3>
    계절로 지나가는 하늘에는<br>
    . . .
