<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=SUIT:wght@400;600;700;800&display=swap');

      :root {
        --bg-1: #fff6de;
        --bg-2: #ffe9cf;
        --card: rgba(255, 255, 255, 0.72);
        --line: #e7cba2;
        --text: #2d2218;
        --accent: #ff7a18;
        --accent-2: #d84e00;
        --soft-shadow: 0 14px 30px rgba(126, 67, 20, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'SUIT', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 10%, rgba(255, 190, 117, 0.35), transparent 34%),
          radial-gradient(circle at 92% 18%, rgba(255, 114, 80, 0.22), transparent 30%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        width: min(940px, 100%);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--soft-shadow);
        backdrop-filter: blur(4px);
        animation: riseUp 0.7s ease-out both;
      }

      h1 {
        margin: 0 0 18px;
        font-family: 'Black Han Sans', sans-serif;
        font-size: clamp(1.8rem, 3.2vw, 2.5rem);
        letter-spacing: 0.01em;
        color: #20150d;
      }

      h2 {
        margin: 22px 0 12px;
        font-size: 1.3rem;
        color: #3f2c1a;
      }

      ul {
        list-style: none;
        padding: 14px 16px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 248, 236, 0.92);
        display: grid;
        gap: 6px;
      }

      li {
        font-weight: 600;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.9);
      }

      th,
      td {
        border: 1px solid #ead8bf;
        text-align: center;
        padding: 10px 8px;
      }

      th {
        background: linear-gradient(180deg, #fff1d8, #ffe8c5);
      }

      td img {
        width: clamp(72px, 10vw, 96px);
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(117, 63, 24, 0.2);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      td a {
        color: var(--accent-2);
        font-weight: 700;
        text-decoration-thickness: 1.5px;
      }

      td a:hover img {
        transform: translateY(-4px) scale(1.03);
        box-shadow: 0 14px 22px rgba(117, 63, 24, 0.26);
      }

      td a:hover {
        color: var(--accent);
      }

      iframe {
        width: min(100%, 260px);
        height: 160px;
        border: 2px solid var(--line);
        border-radius: 16px;
        background: #fffdf9;
        box-shadow: 0 10px 20px rgba(117, 63, 24, 0.14);
      }

      @keyframes riseUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .container {
          padding: 18px;
          border-radius: 18px;
        }

        th,
        td {
          padding: 8px 6px;
          font-size: 0.95rem;
        }

        iframe {
          height: 220px;
        }
      }
    </style>
</head>
<body>
  <div class="container">
    <h1>실습1. 과일 가격표 작성</h1>

    <ul>
      <li>학번: 202401569</li>
      <li>이름: 이우주</li>
    </ul>

    <h2>과일 가격표</h2>

    <table border="1">
      <tr>
        <th>항목</th>
        <th colspan="3">과일</th>
      </tr>
      <tr>
        <th>품목</th>
        <td>
          <a href="../media/apple.jpg" target="favFruitFrame">
            <img src="../media/apple.jpg" alt="사과">
          </a>
          <a href="../media/apple.jpg" target="favFruitFrame">사과</a>
        </td>
        <td>
          <a href="../media/mango.jpg" target="favFruitFrame">
            <img src="../media/mango.jpg" alt="망고">
          </a>
          <a href="../media/mango.jpg" target="favFruitFrame">망고</a>
        </td>
        <td>
          <a href="../media/melon.jpg" target="favFruitFrame">
            <img src="../media/melon.jpg" alt="멜론">
          </a>
          <a href="../media/melon.jpg" target="favFruitFrame">멜론</a>
        </td>
      </tr>
      <tr>
        <th>가격</th>
        <td>20,000원</td>
        <td>30,000원</td>
        <td>35,000원</td>
      </tr>
    </table>

    <h2>내가 좋아하는 과일</h2>

    <div>
      <iframe
        name="favFruitFrame"
        src="about:blank"
        width="160"
        height="130"
        title="내가 좋아하는 과일">
      </iframe>
    </div>
  </div>
</body>
</html>
