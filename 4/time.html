<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 정보 입력</title>
</head>
<body>
    <h3>시간 정보 입력 HTML5 폼 요소들</h3>
    초기 세팅 : 2024년 5월 5일 오전 9시 15분(5초 10)<br>
    시간을 변경해 보세요. <br><br>
    <form action="dummy" method="get">>
        month : <input type="month" name="mt" value="2024-05"><br><br>
        week : <input type="week" name="wk" value="2024-w18"><br><br>
        date : <input type="date" name="dt" value="2024-05-05"><br><br>
        time : <input type="time" name="tm" value="09:15"><br><br>
        local : <input type="datetime-local" name="lc"
        value="2024-05-05T09:30:05.10"><br><br>
        <input type="submit">
</body>
</html>
