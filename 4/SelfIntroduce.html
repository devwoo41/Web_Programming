<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 입력 폼</title>
</head>
<body>
    <h3>자기 소개서 작성</h3>
    <form>
        이름 : <input type="text" name="name" value="홍길동"
        size = "20"><br>
        
        암호 : <input type="password" name="pw" size="20"
        minlength="4" maxlength="6"
        placeholder="4~6글자"><br><br>

        소개 : <textarea name="desc" cols="22" rows="5">
            이곳에 자기 소개 작성
        </textarea>
    </form>
    
</body>
</html>
