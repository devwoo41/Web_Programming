<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버튼 모음</title>
</head>
<body>
    <h3>버튼 모음</h3>
    <form>
        일반 버튼 : <input type="text" size="10" value="">
        <button type="button">검색2</button>
        <br><br>
        
        submit 버튼 : <input type="submit" value="전송1">
        <button type="submit">전송2</button>
        <br><br>

        reset 버튼 : <input type="reset" value="리셋1">
        <button type="reset">리셋2</button>
        <br><br>

        이미지 버튼 : <input type="image" src="../media/earth.png">
        <button type="button"><img src="../media/earth.png"></button>    
    </form>
</body>
</html>
