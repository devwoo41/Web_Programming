<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드롭다운 리스트</title>
</head>
<body>
    <h3>뉴 자금성 메뉴</h3>
    <form action="dummy" method="get">
        <select name="meal" size="1">
            <option value="m1" selected>짜장면</option>
            <option value="m2">해물짬뽕</option>
            <option value="m3">새우볶음밥</option>
        </select>
        <select name="cooking" size="3" multiple>
            <option value="c1" selected>탕수육</option>
            <option value="c2">팔보채</option>
            <option value="c3">유린기</option>
            <option value="c4">동파육</option>
            <option value="c5">해파리냉채</option>
        </select>
        <input type="submit" value="주문">
    </form>
</body>
</html>
