<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>편리한 숫자 입력</title>
</head>
<body>
    <h3>난방기 제어</h3>
    <form>
        지속 시간 (0~10시간, 30분 단위):
        <input type="number" name="duration" value="1.0"
        min="0.0" max="10.0" step="0.5"> 시간 <br><br>
        온도 설정 (10~30&deg, 5&deg 단위):
        10&deg; <input type="range" name="temperature" value="20"
        min="10" max="30" step="5"> 30&deg;
    </form>
</body>
</html>
